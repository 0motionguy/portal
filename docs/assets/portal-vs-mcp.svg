<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-labelledby="chart-title chart-desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="chart-title">MCP preloaded schemas vs Portal on-visit — measured input tokens per turn</title>
  <desc id="chart-desc">Grouped bar chart at 10, 50, 100 and 400 tools. MCP grows linearly. Portal stays flat at 172 tokens. Measured via Anthropic count_tokens, seed 42, Sonnet 4.5 and Opus 4.5.</desc>

  <defs>
    <pattern id="grid3" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#181818" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="440" fill="#EEE7D5"/>
  <rect width="1200" height="440" fill="url(#grid3)"/>

  <!-- title + eyebrow -->
  <g transform="translate(60 48)">
    <rect x="0" y="-14" width="6" height="6" fill="#DA7756"/>
    <text x="16" y="-8" font-size="12" letter-spacing="2.2" fill="#2A2724" font-weight="500">
      MEASURED · ANTHROPIC COUNT_TOKENS · SEED 42
    </text>
    <text y="24" font-size="22" fill="#181818" font-weight="600">MCP preloaded vs Portal on-visit</text>
    <text y="48" font-size="13" fill="#6B6359" font-family="'Geist Mono', ui-monospace, monospace">median input tokens per turn, by tool count</text>
  </g>

  <!-- legend -->
  <g transform="translate(820 48)" font-size="13" font-family="'Geist Mono', ui-monospace, monospace">
    <rect x="0" y="0" width="14" height="14" fill="#DA7756"/>
    <text x="22" y="12" fill="#181818">MCP (preloaded)</text>
    <rect x="180" y="0" width="14" height="14" fill="#181818"/>
    <text x="202" y="12" fill="#181818">Portal (on visit)</text>
  </g>

  <!-- y-axis gridlines + labels. Plot area: x[90..1170], y[120..360], max=60k -->
  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="11" fill="#6B6359">
    <line x1="90" y1="120" x2="1170" y2="120" stroke="#181818" stroke-opacity="0.08"/>
    <text x="82" y="124" text-anchor="end">60k</text>
    <line x1="90" y1="180" x2="1170" y2="180" stroke="#181818" stroke-opacity="0.08"/>
    <text x="82" y="184" text-anchor="end">45k</text>
    <line x1="90" y1="240" x2="1170" y2="240" stroke="#181818" stroke-opacity="0.08"/>
    <text x="82" y="244" text-anchor="end">30k</text>
    <line x1="90" y1="300" x2="1170" y2="300" stroke="#181818" stroke-opacity="0.08"/>
    <text x="82" y="304" text-anchor="end">15k</text>
    <line x1="90" y1="360" x2="1170" y2="360" stroke="#181818" stroke-opacity="0.25"/>
    <text x="82" y="364" text-anchor="end">0</text>
  </g>

  <!-- groups. 4 groups. Each group centered at x = 180, 430, 680, 930. Bar width 80. Portal bar offset +90. -->
  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="12">
    <!-- 10 tools: MCP 1956 → h=7.8; Portal 172 → h=3 (min) -->
    <rect x="140" y="352" width="80" height="8" fill="#DA7756"/>
    <text x="180" y="346" text-anchor="middle" fill="#181818">1,956</text>
    <rect x="230" y="357" width="80" height="3" fill="#181818"/>
    <text x="270" y="346" text-anchor="middle" fill="#6B6359">172</text>
    <text x="225" y="390" text-anchor="middle" font-size="16" font-weight="600" fill="#181818">10</text>
    <text x="225" y="408" text-anchor="middle" font-size="11" fill="#DA7756">11.4&#xD7;</text>

    <!-- 50 tools: MCP 7343 → h=29.4; Portal 172 → h=3 -->
    <rect x="390" y="331" width="80" height="29" fill="#DA7756"/>
    <text x="430" y="325" text-anchor="middle" fill="#181818">7,343</text>
    <rect x="480" y="357" width="80" height="3" fill="#181818"/>
    <text x="520" y="325" text-anchor="middle" fill="#6B6359">172</text>
    <text x="475" y="390" text-anchor="middle" font-size="16" font-weight="600" fill="#181818">50</text>
    <text x="475" y="408" text-anchor="middle" font-size="11" fill="#DA7756">42.7&#xD7;</text>

    <!-- 100 tools: MCP 13929 → h=55.7; Portal 172 → h=3 -->
    <rect x="640" y="305" width="80" height="55" fill="#DA7756"/>
    <text x="680" y="299" text-anchor="middle" fill="#181818">13,929</text>
    <rect x="730" y="357" width="80" height="3" fill="#181818"/>
    <text x="770" y="299" text-anchor="middle" fill="#6B6359">172</text>
    <text x="725" y="390" text-anchor="middle" font-size="16" font-weight="600" fill="#181818">100</text>
    <text x="725" y="408" text-anchor="middle" font-size="11" fill="#DA7756">81.0&#xD7;</text>

    <!-- 400 tools: MCP 54677 → h=218.7; Portal 172 → h=3 -->
    <rect x="890" y="141" width="80" height="219" fill="#DA7756"/>
    <text x="930" y="135" text-anchor="middle" font-weight="600" fill="#181818">54,677</text>
    <rect x="980" y="357" width="80" height="3" fill="#181818"/>
    <text x="1020" y="135" text-anchor="middle" fill="#6B6359">172</text>
    <text x="975" y="390" text-anchor="middle" font-size="16" font-weight="600" fill="#181818">400</text>
    <text x="975" y="408" text-anchor="middle" font-size="11" fill="#DA7756">317.9&#xD7;</text>
  </g>

  <!-- x-axis label -->
  <text x="600" y="430" text-anchor="middle" font-size="12" fill="#6B6359" font-family="'Geist Mono', ui-monospace, monospace">tool count &#x2192;</text>
</svg>
