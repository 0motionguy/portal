<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="banner-title banner-desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="banner-title">Portal — the drop-in visit layer for LLM clients</title>
  <desc id="banner-desc">Cream background with coral accent. Large italic serif wordmark "Portal" with tagline and four stat chips.</desc>

  <defs>
    <radialGradient id="glow" cx="18%" cy="12%" r="58%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#DA7756" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="94%" r="48%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#181818" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="#EEE7D5"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#glow)"/>
  <rect width="1200" height="420" fill="url(#glow2)"/>

  <!-- top eyebrow -->
  <g transform="translate(80 68)">
    <rect x="0" y="-18" width="8" height="8" fill="#DA7756"/>
    <text x="20" y="-10" font-size="13" letter-spacing="2.4" fill="#2A2724" font-weight="500">
      VISITPORTAL.DEV · V0.1.1 · BUILT WITH OPUS 4.7
    </text>
  </g>

  <!-- wordmark -->
  <g transform="translate(80 210)">
    <text font-family="'Instrument Serif', 'Georgia', 'Times New Roman', serif" font-style="italic" font-size="168" fill="#181818" font-weight="400" letter-spacing="-2">Portal</text>
    <rect x="4" y="24" width="42" height="6" fill="#DA7756"/>
  </g>

  <!-- tagline -->
  <g transform="translate(82 262)">
    <text font-size="24" fill="#2A2724" font-weight="500">
      The drop-in visit layer for Claude Code and any LLM client.
    </text>
    <text y="34" font-size="16" fill="#6B6359" font-family="'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace">
      two endpoints &#x00B7; one manifest &#x00B7; zero install on the visitor side
    </text>
  </g>

  <!-- right-side stat strip -->
  <g transform="translate(780 90)" font-family="'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace">
    <!-- card bg -->
    <rect x="0" y="0" width="340" height="240" rx="10" fill="#181818"/>
    <rect x="0" y="0" width="340" height="32" rx="10" fill="#2A2724"/>
    <circle cx="16" cy="16" r="4.5" fill="#E88B6A"/>
    <circle cx="32" cy="16" r="4.5" fill="#D4A574"/>
    <circle cx="48" cy="16" r="4.5" fill="#93B88B"/>
    <text x="320" y="20" text-anchor="end" font-size="11" fill="#6B6359">bench &#x2014; measured</text>

    <g fill="#EEE7D5" font-size="13">
      <text x="20" y="64"><tspan fill="#6B6359">$ </tspan><tspan fill="#93B88B">pnpm bench</tspan></text>
      <text x="20" y="90" fill="#6B6359">tools   mcp        portal     ratio</text>
      <text x="20" y="112">  10    1,956      <tspan fill="#E88B6A">172</tspan>        <tspan fill="#D4A574">11.4x</tspan></text>
      <text x="20" y="132">  50    7,343      <tspan fill="#E88B6A">172</tspan>        <tspan fill="#D4A574">42.7x</tspan></text>
      <text x="20" y="152"> 100   13,929      <tspan fill="#E88B6A">172</tspan>        <tspan fill="#D4A574">81.0x</tspan></text>
      <text x="20" y="172"> 400   54,677      <tspan fill="#E88B6A">172</tspan>       <tspan fill="#D4A574">317.9x</tspan></text>
      <text x="20" y="204" fill="#6B6359">sonnet-4-5 &#x2261; opus-4-5 (same tokenizer)</text>
      <text x="20" y="222" fill="#93B88B">&#x25B8; 8/8 conformance checks passing</text>
    </g>
  </g>

  <!-- bottom rule -->
  <line x1="80" y1="360" x2="1120" y2="360" stroke="#181818" stroke-opacity="0.18" stroke-width="1"/>

  <!-- footer eyebrow -->
  <g transform="translate(80 388)" font-family="'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="12" fill="#6B6359">
    <text>VISIT &#x00B7; DON&#x2019;T INSTALL</text>
    <text x="1040" text-anchor="end">github.com/0motionguy/portal</text>
  </g>
</svg>
