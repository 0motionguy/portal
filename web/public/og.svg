<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="banner-title banner-desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="banner-title">Portal — if your service has a URL, an agent can visit it</title>
  <desc id="banner-desc">Cream background with coral accent. Two-line hero in serif/italic with the v0.1.6 tagline and a mono caption.</desc>

  <defs>
    <radialGradient id="glow" cx="18%" cy="12%" r="58%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#DA7756" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="94%" r="48%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#181818" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="#EEE7D5"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#glow)"/>
  <rect width="1200" height="420" fill="url(#glow2)"/>

  <!-- top eyebrow -->
  <g transform="translate(80 68)">
    <rect x="0" y="-18" width="8" height="8" fill="#DA7756"/>
    <text x="20" y="-10" font-size="13" letter-spacing="2.4" fill="#2A2724" font-weight="500">
      VISITPORTAL.DEV · v0.1.6 · APACHE-2.0
    </text>
  </g>

  <!-- hero line 1 -->
  <g transform="translate(80 200)">
    <text font-family="'Instrument Serif', 'Georgia', 'Times New Roman', serif" font-size="78" fill="#181818" font-weight="400" letter-spacing="-1.5">If your service has a URL,</text>
  </g>

  <!-- hero line 2 -->
  <g transform="translate(80 290)">
    <text font-family="'Instrument Serif', 'Georgia', 'Times New Roman', serif" font-style="italic" font-size="78" fill="#DA7756" font-weight="400" letter-spacing="-1.5">an agent can visit it.</text>
    <rect x="0" y="16" width="42" height="6" fill="#DA7756"/>
  </g>

  <!-- bottom rule -->
  <line x1="80" y1="360" x2="1120" y2="360" stroke="#181818" stroke-opacity="0.18" stroke-width="1"/>

  <!-- bottom caption -->
  <g transform="translate(80 388)" font-family="'Geist Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="13" fill="#2A2724">
    <text>visitportal.dev &#x00B7; v0.1.6 &#x00B7; HTTP-native agent contract</text>
    <text x="1040" text-anchor="end" fill="#6B6359">github.com/0motionguy/portal</text>
  </g>
</svg>
