name = "portal-cf-worker"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
workers_dev = true

# Production payment configuration. Uncomment + fill in to switch the Worker
# from mockFacilitator (accepts any X-Payment, test/dev only) to a real x402
# facilitator that verifies on-chain. Default test mode runs without these.
#
# [vars]
# FACILITATOR_URL = "https://www.x402.org/facilitator"
# PAYEE_ADDRESS = "0xYourReceivingAddressOnBaseSepolia"
# PAYMENT_NETWORK = "eip155:84532"  # CAIP-2 (Base-Sepolia). x402 v2 requires CAIP-2 format.
# PAYMENT_ASSET = "0x036CbD53842c5426634e7929541eC2318f3dCF7e"  # Base-Sepolia USDC
# PAYMENT_AMOUNT = "10000"  # 0.01 USDC at 6 decimals
#
# For self-hosted facilitators (x402-rs, x402-sovereign), set FACILITATOR_URL to
# your verifier and use `wrangler secret put FACILITATOR_API_KEY` if it requires
# auth.
