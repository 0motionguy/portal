name = "portal-cf-worker"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
workers_dev = true

# Production payment configuration. Live x402 v2 facilitator.
# (Reverted to mock by deleting this [vars] block; that's the test/dev posture.)
[vars]
FACILITATOR_URL = "https://www.x402.org/facilitator"
PAYEE_ADDRESS = "0x2e66236984af3e7f4B011f1318B253Cb3b03E1B2"  # self-transfer for the round-trip test
PAYMENT_NETWORK = "eip155:8453"  # CAIP-2 (Base mainnet). v2 requires CAIP-2 format.
PAYMENT_ASSET = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"  # Base mainnet USDC
PAYMENT_AMOUNT = "1000"  # 0.001 USDC (~$0.001) — tiny test payment
PAYMENT_ASSET_NAME = "USD Coin"  # USDC.name() on Base mainnet (was "USDC" on Sepolia)
PAYMENT_ASSET_VERSION = "2"  # USDC.version()
